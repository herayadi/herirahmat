<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Arctic Frost CMS</title>
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="css/admin.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Quill WYSIWYG -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
</head>
<body class="admin-dashboard-body">
    <!-- Sidebar Navigation -->
    <aside class="admin-sidebar">
        <div class="sidebar-header">
            <div class="admin-logo">
                <span class="logo-icon">❄️</span>
                <h1>Arctic<span>Frost</span></h1>
            </div>
        </div>

        <nav class="sidebar-nav">
            <ul>
                <li class="nav-item active" data-module="dashboard">
                    <a href="#dashboard">
                        <span class="nav-icon">📊</span>
                        <span class="nav-text">Dashboard</span>
                    </a>
                </li>
                <li class="nav-item" data-module="profile">
                    <a href="#profile">
                        <span class="nav-icon">👤</span>
                        <span class="nav-text">Profile</span>
                    </a>
                </li>
                <li class="nav-item" data-module="experiences">
                    <a href="#experiences">
                        <span class="nav-icon">💼</span>
                        <span class="nav-text">Experience</span>
                    </a>
                </li>
                <li class="nav-item" data-module="projects">
                    <a href="#projects">
                        <span class="nav-icon">🚀</span>
                        <span class="nav-text">Projects</span>
                    </a>
                </li>
                <li class="nav-item" data-module="skills">
                    <a href="#skills">
                        <span class="nav-icon">🛠️</span>
                        <span class="nav-text">Skills</span>
                    </a>
                </li>
                <li class="nav-item" data-module="blog">
                    <a href="#blog">
                        <span class="nav-icon">✍️</span>
                        <span class="nav-text">Blog</span>
                    </a>
                </li>
                <li class="nav-item" data-module="messages">
                    <a href="#messages">
                        <span class="nav-icon">✉️</span>
                        <span class="nav-text">Messages</span>
                        <span id="msg-badge" class="badge hidden">0</span>
                    </a>
                </li>
            </ul>
        </nav>

        <div class="sidebar-footer">
            <button id="logout-btn" class="btn-logout">
                <span class="nav-icon">🚪</span>
                <span class="nav-text">Logout</span>
            </button>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="admin-main">
        <header class="admin-topbar">
            <div class="topbar-left">
                <button id="menu-toggle" class="mobile-only">☰</button>
                <h2 id="page-title">Dashboard</h2>
            </div>
            <div class="topbar-right">
                <div class="user-info">
                    <span id="admin-name">Admin</span>
                    <div class="user-avatar">👤</div>
                </div>
                <a href="../index.html" target="_blank" class="view-site-btn">View Site ↗</a>
            </div>
        </header>

        <section id="content-area" class="content-container">
            <!-- Content will be injected here by JS modules -->
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <p>Loading module...</p>
            </div>
        </section>
    </main>

    <!-- Toasts / Notifications -->
    <div id="toast-container"></div>

    <!-- Scripts -->
    <script src="js/admin-api.js"></script>
    <script src="js/admin-app.js"></script>
</body>
</html>
