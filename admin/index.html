<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Arctic Frost CMS</title>
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="css/admin.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="admin-login-body">
    <div class="login-container">
        <div class="login-card glass-morphism">
            <div class="login-header">
                <div class="admin-logo">
                    <span class="logo-icon">❄️</span>
                    <h1>Arctic<span>Frost</span></h1>
                </div>
                <p>Content Management System</p>
            </div>

            <form id="login-form" class="admin-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="text" id="username" name="username" placeholder="Enter username" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password" name="password" placeholder="Enter password" required>
                    </div>
                </div>

                <div id="login-error" class="error-message hidden">
                    Invalid username or password
                </div>

                <button type="submit" id="login-btn" class="btn btn-primary btn-block">
                    <span class="btn-text">Sign In</span>
                    <span class="loading-spinner hidden"></span>
                </button>
            </form>

            <div class="login-footer">
                <a href="../index.html" class="back-link">← Back to Portfolio</a>
            </div>
        </div>
    </div>

    <!-- Background Decoration -->
    <div class="bg-decoration">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <script src="js/admin-api.js"></script>
    <script src="js/admin-auth.js"></script>
</body>
</html>
