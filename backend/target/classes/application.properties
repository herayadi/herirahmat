# ============================================
# SPRING BOOT CONFIGURATION
# ============================================
spring.application.name=portfolio-backend
server.port=8080

# ============================================
# DATABASE CONFIGURATION (H2 File-based)
# ============================================
# Database file will be created in the current directory as portfolio.mv.db
spring.datasource.url=jdbc:h2:file:./portfolio;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# H2 Console (Access via http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ============================================
# LOGGING
# ============================================
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

# ============================================
# JWT CONFIGURATION
# ============================================
jwt.secret=portfolio-admin-secret-key-change-in-production-2026
jwt.expiration=86400000
